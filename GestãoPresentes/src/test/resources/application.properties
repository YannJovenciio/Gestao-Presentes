spring.datasource.url=jdbc:h2:mem:gestao_presentes_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${SPRING.DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING.DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=false

